# SVTD Continuous Integration
# 
# This workflow runs tests on every push and pull request.
# It ensures code quality and prevents regressions.

name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install -e .

    - name: Run tests
      run: |
        pytest tests/ -v --cov=svtd --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort

    - name: Check code formatting with black
      run: |
        black --check svtd/ tests/ examples/ demos/
      continue-on-error: true

    - name: Check import sorting with isort
      run: |
        isort --check-only svtd/ tests/ examples/ demos/
      continue-on-error: true

    - name: Lint with flake8
      run: |
        # Stop on syntax errors or undefined names
        flake8 svtd/ tests/ examples/ demos/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat all other errors as warnings
        flake8 svtd/ tests/ examples/ demos/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  demos:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run law demo
      run: |
        cd demos/law_demo
        python run_law_demo.py

    - name: Run simple RAG demo
      run: |
        cd demos/simple_rag_demo
        python demo.py

  examples:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run basic usage example
      run: |
        cd examples
        python basic_usage.py

    - name: Run RAG pipeline example
      run: |
        cd examples
        python rag_pipeline.py
